short_bio: >-
  <p>
    I am a Ph.D. student in Computer Engineering at Gachon University under the supervision of Prof. Chang Choi.
    My research topics on Knowledge Inference, Graph Representation, and Explainable AI, specifically focusing on video understanding.
    Currently, my research employs scene and knowledge graphs to model semantic relationships and contextual dependencies, advancing methodologies to enhance the transparency and interpretability of AI systems.
    This research addresses critical challenges such as data sparsity, domain variability, and scalability, contributing to bridging the gap between low-level visual data and high-level semantic abstraction.
  </p>
  <p>
    I am actively seeking opportunities for academic collaboration in visual understanding, knowledge inference, and related domains.
    Please feel free to reach out to discuss potential research partnerships.
  </p>

